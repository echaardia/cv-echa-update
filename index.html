<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CV Online - Echa Ardia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="logo"><i class="fas fa-user-astronaut"></i> CV Echa</h1>
            <div class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </div>
            <nav class="main-nav" id="mainNav">
                <button class="nav-btn active" data-page="home"><i class="fas fa-home"></i> Home</button>
                <button class="nav-btn" data-page="about"><i class="fas fa-user"></i> About</button>
                <button class="nav-btn" data-page="skills"><i class="fas fa-code"></i> Skills</button>
                <button class="nav-btn" data-page="education"><i class="fas fa-graduation-cap"></i> Education</button>
                <button class="nav-btn" data-page="experience"><i class="fas fa-briefcase"></i> Experience</button>
                <button class="nav-btn" data-page="portfolio"><i class="fas fa-folder-open"></i> Portfolio</button>
                <button class="nav-btn" data-page="certificate"><i class="fas fa-certificate"></i> Certificate</button>
                <button class="nav-btn" data-page="contact"><i class="fas fa-envelope"></i> Contact</button>
                <button class="nav-btn" data-page="github"><i class="fab fa-github"></i> GitHub</button>
            </nav>
        </header>

        <main id="mainContent" class="main-content">
            <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                <i class="fas fa-spinner fa-pulse"></i> Loading...
            </div>
            <div id="pageContainer"></div>
        </main>

        <footer>
            <p>&copy; 2026 Echa Ardia - CV Online SPA</p>
        </footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
