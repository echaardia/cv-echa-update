<div class="card">
    <h3><i class="fas fa-paper-plane"></i> Kirim Pesan Baru</h3>
    <form id="contactForm">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Nama Lengkap</label>
            <input type="text" id="contactName" placeholder="Masukkan nama Anda">
        </div>
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="contactEmail" placeholder="email@example.com">
        </div>
        <div class="form-group">
            <label><i class="fas fa-comment"></i> Pesan</label>
            <textarea id="contactMessage" rows="4" placeholder="Minimal 10 karakter..."></textarea>
        </div>
        <button type="submit" class="btn-submit">
            <i class="fas fa-save"></i> Kirim & Simpan
        </button>
        <button type="button" id="clearAllMessages" class="btn-secondary">
            <i class="fas fa-trash-alt"></i> Hapus Semua Pesan
        </button>
    </form>
</div>

</div>
